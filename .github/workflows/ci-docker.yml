name: Docker Build

on:
  push:
    paths:
      - 'service/**'
      - 'src/ui/**'
      - 'pyproject.toml'
      - 'uv.lock'
      - '.github/workflows/ci-docker.yml'
  pull_request:
    paths:
      - 'service/**'
      - 'src/ui/**'
      - 'pyproject.toml'
      - 'uv.lock'
      - '.github/workflows/ci-docker.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: [gateway, worker]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: service/docker/prod.Dockerfile
          target: ${{ matrix.target }}
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
