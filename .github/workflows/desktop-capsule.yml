name: Desktop Capsule

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: desktop-capsule-${{ github.ref }}
  cancel-in-progress: false

jobs:
  capsule:
    name: Build and verify capsule (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            runner: macos-14
          - target: x86_64-apple-darwin
            runner: macos-13
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-24.04
          - target: x86_64-pc-windows-msvc
            runner: windows-2022

    runs-on: ${{ matrix.runner }}
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - name: Set up uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          enable-cache: true
          version: "0.11.29"

      - name: Install Python
        run: uv python install 3.13

      - name: Restore download cache
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: .capsule-cache
          key: capsule-inputs-${{ matrix.target }}-${{ hashFiles('scripts/desktop_capsule_inputs.toml') }}
          restore-keys: |
            capsule-inputs-${{ matrix.target }}-

      - name: Build capsule
        shell: bash
        run: |
          uv run --no-sync python scripts/build_desktop_capsule.py build \
            --target ${{ matrix.target }} \
            --out-dir dist/capsules \
            --cache-dir .capsule-cache

      - name: Verify capsule
        shell: bash
        run: |
          uv run --no-sync python scripts/verify_desktop_capsule.py verify \
            dist/capsules/${{ matrix.target }}.zip

      - name: Emit SBOM
        shell: bash
        run: |
          uv run --no-sync python scripts/verify_desktop_capsule.py sbom \
            dist/capsules/${{ matrix.target }}.zip \
            --output dist/capsules/${{ matrix.target }}.sbom.json

      - name: Upload capsule artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: desktop-capsule-${{ matrix.target }}
          path: |
            dist/capsules/${{ matrix.target }}.zip
            dist/capsules/${{ matrix.target }}.manifest.json
            dist/capsules/${{ matrix.target }}.sbom.json
          if-no-files-found: error
          retention-days: 30

  publish:
    name: Publish release assets
    needs: capsule
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-24.04
    timeout-minutes: 20

    steps:
      - name: Download all capsule artifacts
        uses: actions/download-artifact@95815c38cf2ff2164869cbab79da8d1f422bc89e # v4.2.1
        with:
          pattern: desktop-capsule-*
          path: release-assets
          merge-multiple: true

      - name: Create GitHub release and upload assets
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          NOTES="Deterministic A2A desktop capsules for all five target triples.

          Each triple ships a verified ZIP containing CPython 3.13, Node.js 22,
          ACP 0.59.0, the vaultspec-a2a wheel, and the locked Python dependency closure.
          The component manifest inside each archive records per-asset SHA-256 digests
          and canonical bytes for cross-language verification."

          gh release create "${TAG_NAME}" \
            --repo "${{ github.repository }}" \
            --title "Desktop Capsule ${TAG_NAME}" \
            --notes "${NOTES}" \
            release-assets/*.zip \
            release-assets/*.manifest.json \
            release-assets/*.sbom.json
