name: Desktop Capsule

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: desktop-capsule-${{ github.ref }}
  cancel-in-progress: false

jobs:
  capsule:
    name: Build and verify capsule (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            runner: macos-14
          - target: x86_64-apple-darwin
            runner: macos-15-intel
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-24.04
          - target: x86_64-pc-windows-msvc
            runner: windows-2022

    runs-on: ${{ matrix.runner }}
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          enable-cache: true
          version: "0.11.29"

      - name: Install Python
        run: uv python install 3.13

      - name: Install locked build environment
        run: uv sync --locked --no-default-groups --group tooling

      - name: Restore download cache
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: .capsule-cache
          key: capsule-inputs-${{ matrix.target }}-${{ hashFiles('scripts/desktop_capsule_inputs.toml') }}
          restore-keys: |
            capsule-inputs-${{ matrix.target }}-

      - name: Build capsule
        shell: bash
        run: |
          uv run --no-sync --frozen python scripts/build_desktop_capsule.py build \
            --target ${{ matrix.target }} \
            --out-dir dist/capsules \
            --cache-dir .capsule-cache

      - name: Verify capsule
        shell: bash
        run: |
          uv run --no-sync --frozen python scripts/verify_desktop_capsule.py verify \
            dist/capsules/${{ matrix.target }}.zip

      - name: Emit SBOM
        shell: bash
        run: |
          uv run --no-sync --frozen python scripts/verify_desktop_capsule.py sbom \
            dist/capsules/${{ matrix.target }}.zip \
            --output dist/capsules/${{ matrix.target }}.sbom.json

      - name: Bind capsule archive digest
        id: capsule-digest
        shell: bash
        env:
          CAPSULE_PATH: dist/capsules/${{ matrix.target }}.zip
        run: |
          uv run --no-sync --frozen python -c "import hashlib, os; from pathlib import Path; p = Path(os.environ['CAPSULE_PATH']); digest = hashlib.sha256(p.read_bytes()).hexdigest(); p.with_suffix(p.suffix + '.sha256').write_text(f'{digest}  {p.name}\n', encoding='ascii'); Path(os.environ['GITHUB_OUTPUT']).open('a', encoding='utf-8').write(f'sha256={digest}\n')"

      - name: Upload capsule artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: desktop-capsule-${{ matrix.target }}-${{ steps.capsule-digest.outputs.sha256 }}
          path: |
            dist/capsules/${{ matrix.target }}.zip
            dist/capsules/${{ matrix.target }}.zip.sha256
            dist/capsules/${{ matrix.target }}.manifest.json
            dist/capsules/${{ matrix.target }}.sbom.json
          if-no-files-found: error
          retention-days: 30
