repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: Lint and fix Python code (Ruff)
        entry: ruff check --fix
        language: system
        types: [python]
        pass_filenames: true

      - id: ruff-format
        name: Format Python code (Ruff)
        entry: ruff format
        language: system
        types: [python]
        pass_filenames: true

      - id: taplo-format
        name: Format TOML files (Taplo)
        entry: npx @taplo/cli fmt
        language: system
        types: [toml]
        pass_filenames: true

      - id: taplo-lint
        name: Lint TOML files (Taplo)
        entry: npx @taplo/cli lint
        language: system
        types: [toml]
        pass_filenames: true

      - id: ty
        name: Type-check Python codebase (Ty)
        entry: uv run python -m ty check src
        language: system
        types: [python]
        pass_filenames: false

      - id: lychee
        name: Check documentation links (Lychee)
        entry: lychee
        language: system
        args: ["--no-progress", "--exclude-path", "README.md"]
        types: [markdown]

      - id: markdownlint
        name: Lint Markdown style (markdownlint)
        entry: npx --yes markdownlint-cli
        language: system
        args: ["--config", ".markdownlint.json", "README.md", "knowledge/*.md", ".gemini/*.md"]
        types: [markdown]
        pass_filenames: false

      # ── Frontend Hooks ──────────────────────────────────────────

      - id: eslint
        name: Lint JS/TS/Svelte (ESLint)
        entry: npx eslint --fix
        language: system
        types_or: [javascript, ts, svelte]
        pass_filenames: true

      - id: prettier
        name: Format JS/TS/Svelte/CSS (Prettier)
        entry: npx prettier --write --ignore-unknown
        language: system
        types_or: [javascript, ts, svelte, css, html, json]
        pass_filenames: true

      - id: stylelint
        name: Lint CSS / Tailwind (Stylelint)
        entry: npx stylelint --fix
        language: system
        types: [css]
        pass_filenames: true

      - id: svelte-check
        name: Type-check Svelte codebase
        entry: npx svelte-check --fail-on-warnings
        language: system
        types: [svelte]
        pass_filenames: false
