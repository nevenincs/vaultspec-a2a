# Development environment: real backend + vite dev + Jaeger tracing (ADR-019).
# Usage: docker compose up --build
# App: http://localhost:8000 (API)
# Frontend: http://localhost:5173 (HMR, proxied to API)
# Jaeger UI: http://localhost:16686

services:
  api:
    build:
      context: .
      dockerfile: docker/prod.Dockerfile
      target: api
    ports:
      - '8000:8000'
    volumes:
      - db-data:/app/data
    environment:
      VAULTSPEC_DATABASE_URL: 'sqlite+aiosqlite:////app/data/vaultspec.db'
      VAULTSPEC_AUTO_SPAWN_WORKER: 'false'
      VAULTSPEC_WORKER_URL: 'http://worker:8001'
    depends_on:
      - worker
    healthcheck:
      test:
        [
          'CMD',
          'python',
          '-c',
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/internal/health')",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  worker:
    build:
      context: .
      dockerfile: docker/prod.Dockerfile
      target: worker
    volumes:
      - db-data:/app/data
    environment:
      VAULTSPEC_DATABASE_URL: 'sqlite+aiosqlite:////app/data/vaultspec.db'
      VAULTSPEC_MCP_API_BASE_URL: 'http://api:8000'
    healthcheck:
      test:
        [
          'CMD',
          'python',
          '-c',
          "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  frontend:
    build:
      context: .
      dockerfile: docker/dev.Dockerfile
      target: node-base
    command: npm run dev -- --host 0.0.0.0
    ports:
      - '5173:5173'
    volumes:
      - ./src/ui:/app/src/ui
      - /app/src/ui/node_modules # exclude host node_modules from mount
    working_dir: /app/src/ui
    environment:
      # Vite proxy target inside Docker network
      VITE_API_URL: http://api:8000
    depends_on:
      api:
        condition: service_healthy

  vidaimock:
    build:
      context: .
      dockerfile: docker/vidaimock.Dockerfile
    ports:
      - '8100:8100'
    command:
      [
        'vidaimock',
        '--port',
        '8100',
        '--host',
        '0.0.0.0',
        '--config-dir',
        '/app/tapes',
        '--mode',
        'realistic',
        '--latency',
        '200',
      ]
    volumes:
      - ./src/vaultspec_a2a/core/presets/mock/tapes:/app/tapes
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:8100/v1/models']
      interval: 5s
      timeout: 5s
      retries: 5

  mock-seeder:
    build:
      context: .
      dockerfile: docker/dev.Dockerfile
      target: mock-seeder
    environment:
      - VAULTSPEC_DATABASE_URL=sqlite+aiosqlite:////app/data/vaultspec.db
      - VAULTSPEC_WORKSPACE_ROOT=/app
      # Tracing defaults OFF: mock-seeder runs infinite loops and will burn LangSmith quota.
      # Set LANGSMITH_TRACING=true in your .env only when you need trace data.
      - LANGSMITH_TRACING=${LANGSMITH_TRACING:-false}
      - LANGSMITH_API_KEY=${LANGSMITH_API_KEY}
      - LANGSMITH_PROJECT=${LANGSMITH_PROJECT:-Vaultspec}
      - LANGSMITH_ENDPOINT=${LANGSMITH_ENDPOINT:-https://api.smith.langchain.com}
      - MOCK_API_BASE=http://vidaimock:8100
    depends_on:
      vidaimock:
        condition: service_healthy
    volumes:
      - .:/app
      - /app/.venv # exclude host .venv from mount
      - db-data:/app/data
    healthcheck:
      test:
        [
          'CMD',
          'python',
          '-c',
          "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')",
        ]
      interval: 10s
      timeout: 5s
      retries: 3

  jaeger:
    image: jaegertracing/jaeger:latest
    ports:
      - '4317:4317' # OTLP gRPC receiver
      - '4318:4318' # OTLP HTTP receiver
      - '16686:16686' # Jaeger trace UI

volumes:
  db-data:
