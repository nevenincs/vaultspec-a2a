# Frontend-ready development environment: backend + worker + Vite.
# Usage: docker compose -f docker-compose.dev.yml up --build
# Gateway: http://localhost:8000
# Frontend: http://localhost:5173 (HMR, proxied to the gateway)

services:
  gateway:
    build:
      context: .
      dockerfile: docker/prod.Dockerfile
      target: gateway
    ports:
      - '8000:8000'
    volumes:
      - db-data:/app/data
    environment:
      VAULTSPEC_DATABASE_URL: 'sqlite+aiosqlite:////app/data/vaultspec.db'
      VAULTSPEC_WORKER_URL: 'http://worker:8001'
    depends_on:
      - worker
    healthcheck:
      test:
        [
          'CMD',
          'python',
          '-c',
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/internal/health')",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  worker:
    build:
      context: .
      dockerfile: docker/prod.Dockerfile
      target: worker
    volumes:
      - db-data:/app/data
    environment:
      VAULTSPEC_DATABASE_URL: 'sqlite+aiosqlite:////app/data/vaultspec.db'
      VAULTSPEC_MCP_API_BASE_URL: 'http://gateway:8000'
    healthcheck:
      test:
        [
          'CMD',
          'python',
          '-c',
          "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  frontend:
    build:
      context: .
      dockerfile: docker/dev.Dockerfile
      target: node-base
    command: npm run dev -- --host 0.0.0.0
    ports:
      - '5173:5173'
    volumes:
      - ./src/ui:/app/src/ui
      - /app/src/ui/node_modules # exclude host node_modules from mount
    working_dir: /app/src/ui
    environment:
      # Vite proxy target inside Docker network
      VITE_API_URL: http://gateway:8000
    depends_on:
      gateway:
        condition: service_healthy

volumes:
  db-data:
