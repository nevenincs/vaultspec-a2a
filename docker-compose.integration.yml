services:
  gateway:
    environment:
      OTEL_EXPORTER_OTLP_ENDPOINT: 'http://jaeger:4317'
      OTEL_EXPORTER_OTLP_INSECURE: 'true'
      VAULTSPEC_AUTO_SPAWN_WORKER: 'false'
    depends_on:
      worker:
        condition: service_healthy
      jaeger:
        condition: service_healthy

  worker:
    environment:
      OTEL_EXPORTER_OTLP_ENDPOINT: 'http://jaeger:4317'
      OTEL_EXPORTER_OTLP_INSECURE: 'true'
    depends_on:
      jaeger:
        condition: service_healthy

  vidaimock:
    build:
      context: .
      dockerfile: docker/vidaimock.Dockerfile
    ports:
      - '${VIDAIMOCK_PORT:-8100}:8100'
    command:
      [
        'vidaimock',
        '--port',
        '8100',
        '--host',
        '0.0.0.0',
        '--config-dir',
        '/app/tapes',
        '--mode',
        'realistic',
        '--latency',
        '200',
      ]
    volumes:
      - ./src/vaultspec_a2a/core/presets/mock/tapes:/app/tapes
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:8100/v1/models']
      interval: 5s
      timeout: 5s
      retries: 5

  mock-seeder:
    build:
      context: .
      dockerfile: docker/dev.Dockerfile
      target: mock-seeder
    environment:
      VAULTSPEC_DATABASE_URL: 'sqlite+aiosqlite:////app/data/vaultspec.db'
      VAULTSPEC_DATABASE_BACKEND: sqlite
      VAULTSPEC_CHECKPOINT_BACKEND: sqlite
      VAULTSPEC_WORKSPACE_ROOT: '/app'
      LANGSMITH_TRACING: ${LANGSMITH_TRACING:-false}
      LANGSMITH_API_KEY: ${LANGSMITH_API_KEY:-}
      LANGSMITH_PROJECT: ${LANGSMITH_PROJECT:-Vaultspec}
      LANGSMITH_ENDPOINT: ${LANGSMITH_ENDPOINT:-https://api.smith.langchain.com}
      MOCK_API_BASE: 'http://vidaimock:8100'
    depends_on:
      vidaimock:
        condition: service_healthy
    volumes:
      - .:/app
      - /app/.venv
      - db-data:/app/data
    healthcheck:
      test:
        [
          'CMD',
          'python',
          '-c',
          "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')",
        ]
      interval: 10s
      timeout: 5s
      retries: 3

  jaeger:
    image: cr.jaegertracing.io/jaegertracing/jaeger:2.16.0
    environment:
      COLLECTOR_OTLP_ENABLED: 'true'
    ports:
      - '${JAEGER_OTLP_PORT:-4317}:4317'
      - '4318:4318'
      - '${JAEGER_UI_PORT:-16686}:16686'
      - '13133:13133'
    healthcheck:
      test: ['CMD', 'wget', '--quiet', '--tries=1', '--spider', 'http://localhost:13133/status']
      interval: 5s
      timeout: 2s
      retries: 10
      start_period: 5s

volumes:
  db-data:
