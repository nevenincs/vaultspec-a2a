# Production-like Postgres overlay for the gateway + worker stack.
# Usage:
#   docker compose -f docker-compose.prod.yml -f docker-compose.prod.postgres.yml up --build

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: vaultspec
      POSTGRES_PASSWORD: vaultspec
      POSTGRES_DB: vaultspec
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vaultspec -d vaultspec"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  gateway:
    environment:
      VAULTSPEC_DATABASE_BACKEND: postgres
      VAULTSPEC_CHECKPOINT_BACKEND: postgres
      VAULTSPEC_DATABASE_URL: postgresql+asyncpg://vaultspec:vaultspec@postgres:5432/vaultspec
      VAULTSPEC_CHECKPOINT_DATABASE_URL: postgresql://vaultspec:vaultspec@postgres:5432/vaultspec?sslmode=disable
      VAULTSPEC_POSTGRES_REQUIRED: "true"
    depends_on:
      postgres:
        condition: service_healthy
      jaeger:
        condition: service_healthy
      worker:
        condition: service_healthy

  worker:
    environment:
      VAULTSPEC_DATABASE_BACKEND: postgres
      VAULTSPEC_CHECKPOINT_BACKEND: postgres
      VAULTSPEC_DATABASE_URL: postgresql+asyncpg://vaultspec:vaultspec@postgres:5432/vaultspec
      VAULTSPEC_CHECKPOINT_DATABASE_URL: postgresql://vaultspec:vaultspec@postgres:5432/vaultspec?sslmode=disable
      VAULTSPEC_POSTGRES_REQUIRED: "true"
    depends_on:
      postgres:
        condition: service_healthy
      jaeger:
        condition: service_healthy

volumes:
  postgres-data:
