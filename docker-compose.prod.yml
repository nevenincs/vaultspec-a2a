# Production override: single backend serves embedded SPA.
# Usage: docker compose -f docker-compose.prod.yml up --build
# App: http://localhost:8000 (FastAPI serves frontend via StaticFiles)
# Jaeger UI: http://localhost:16686

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    ports:
      - "8000:8000"
    volumes:
      - db-data:/app/data
    environment:
      VAULTSPEC_DATABASE_URL: "sqlite+aiosqlite:////app/data/vaultspec.db"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://jaeger:4317"
      OTEL_EXPORTER_OTLP_INSECURE: "true"
    env_file: .env
    depends_on:
      - jaeger

  jaeger:
    image: jaegertracing/jaeger:latest
    ports:
      - "4317:4317"
      - "4318:4318"
      - "16686:16686"
    environment:
      COLLECTOR_OTLP_ENABLED: "true"

volumes:
  db-data:
