# Development environment: fixture server + vite dev + Jaeger tracing (ADR-019).
# Usage: docker compose up --build
# Frontend: http://localhost:5173 (HMR, proxied to fixture server)
# Jaeger UI: http://localhost:16686
#
# NOTE: In dev mode the fixture server provides mock data — no real worker
# is needed.  For real-backend dev, use `just dev-real` which starts the
# API control surface + worker locally with hot-reload.

services:
  fixture-server:
    build:
      context: .
      dockerfile: docker/dev.Dockerfile
      target: python-base
    command: uv run python src/ui/dev/fixture_server.py
    ports:
      - '8000:8000'
    volumes:
      - .:/app
      - /app/.venv # exclude host .venv from mount
    working_dir: /app
    healthcheck:
      test:
        [
          'CMD',
          'python',
          '-c',
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/threads')",
        ]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  frontend:
    build:
      context: .
      dockerfile: docker/dev.Dockerfile
      target: node-base
    command: npm run dev -- --host 0.0.0.0
    ports:
      - '5173:5173'
    volumes:
      - ./src/ui:/app/src/ui
      - /app/src/ui/node_modules # exclude host node_modules from mount
    working_dir: /app/src/ui
    environment:
      # Vite proxy target inside Docker network
      VITE_API_URL: http://fixture-server:8000
    depends_on:
      fixture-server:
        condition: service_healthy

  vidaimock:
    build:
      context: .
      dockerfile: docker/vidaimock.Dockerfile
    ports:
      - "8100:8100"
    command: ["vidaimock", "--port", "8100", "--host", "0.0.0.0", "--config-dir", "/app/tapes", "--mode", "realistic", "--latency", "200"]
    volumes:
      - ./lib/core/presets/mock/tapes:/app/tapes
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8100/v1/models"]
      interval: 5s
      timeout: 5s
      retries: 5

  mock-seeder:
    build:
      context: .
      dockerfile: docker/dev.Dockerfile
      target: mock-seeder
    environment:
      - VAULTSPEC_DATABASE_URL=sqlite+aiosqlite:////app/.vault/a2a.sqlite
      - LANGSMITH_TRACING=true
      - LANGSMITH_API_KEY=${LANGSMITH_API_KEY}
      - LANGSMITH_PROJECT=${LANGSMITH_PROJECT:-Vaultspec}
      - LANGSMITH_ENDPOINT=${LANGSMITH_ENDPOINT:-https://api.smith.langchain.com}
      - MOCK_API_BASE=http://vidaimock:8100/v1
    depends_on:
      vidaimock:
        condition: service_healthy
    volumes:
      - .:/app
      - /app/.venv # exclude host .venv from mount
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 10s
      timeout: 5s
      retries: 3

  jaeger:
    image: jaegertracing/jaeger:latest
    ports:
      - '4317:4317' # OTLP gRPC receiver
      - '4318:4318' # OTLP HTTP receiver
      - '16686:16686' # Jaeger trace UI
