[agent]
id           = "mock-reviewer"
display_name = "Mock Reviewer"
role         = "reviewer"
description  = "Mock reviewer agent for multi-agent teams."

[agent.persona]
system_prompt = "You are a mock reviewer. Emit your programmed sequence."

[agent.model]
provider   = "mock"
capability = "mid"

[agent.capabilities]
filesystem_read  = true
filesystem_write = true
terminal         = true

[agent.permissions]
require_approval_for = []
