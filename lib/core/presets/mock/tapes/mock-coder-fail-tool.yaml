name: "mock-coder-fail-tool"
priority: 100
matcher: "^/mock-coder-fail-tool/v1/chat/completions$"
request_mapping:
  model: "mock-coder-fail-tool"
response_body: |
  {% set turn = json.messages | length %}
  {% if turn <= 2 %}
  {
      "id": "chatcmpl-mock-coder-fail-tool-0",
      "choices": [
          {
              "message": {
                  "role": "assistant",
                  "content": "Running benign shell ping.\n\n<thought>\nI will look for something innocuous to establish a baseline.\n</thought>\n",
                  "tool_calls": [
                      {
                          "id": "call_mock_coder_fail_tool_0",
                          "type": "function",
                          "function": {
                              "name": "run_command",
                              "arguments": "{\"CommandLine\": \"echo 'Hello World'\", \"Cwd\": \"/app\", \"SafeToAutoRun\": true, \"WaitMsBeforeAsync\": 2000}"
                          }
                      }
                  ]
              },
              "finish_reason": "tool_calls"
          }
      ]
  }
  {% elif turn <= 4 %}
  {
      "id": "chatcmpl-mock-coder-fail-tool-1",
      "choices": [
          {
              "message": {
                  "role": "assistant",
                  "content": "Calling view_file poorly.\n\n<thought>\nNow I am going to intentionally supply a broken structural argument string to physically test the parser validator mechanism.\n</thought>\n",
                  "tool_calls": [
                      {
                          "id": "call_mock_coder_fail_tool_1",
                          "type": "function",
                          "function": {
                              "name": "view_file",
                              "arguments": "{\"AbsolutePath\": \"/app/main.py\", \"unclosed\": true"
                          }
                      }
                  ]
              },
              "finish_reason": "tool_calls"
          }
      ]
  }
  {% elif turn <= 6 %}
  {
      "id": "chatcmpl-mock-coder-fail-tool-2",
      "choices": [
          {
              "message": {
                  "role": "assistant",
                  "content": "Retrying bad call.\n\n<thought>\nIt failed properly. Let me repeat it.\n</thought>\n",
                  "tool_calls": [
                      {
                          "id": "call_mock_coder_fail_tool_2",
                          "type": "function",
                          "function": {
                              "name": "view_file",
                              "arguments": "{\"AbsolutePath\": \"/app/main.py\", \"unclosed\": true"
                          }
                      }
                  ]
              },
              "finish_reason": "tool_calls"
          }
      ]
  }
  {% elif turn <= 8 %}
  {
      "id": "chatcmpl-mock-coder-fail-tool-3",
      "choices": [
          {
              "message": {
                  "role": "assistant",
                  "content": "Retrying bad call 3.\n\n<thought>\nFailing repeatedly for UI rendering checks.\n</thought>\n",
                  "tool_calls": [
                      {
                          "id": "call_mock_coder_fail_tool_3",
                          "type": "function",
                          "function": {
                              "name": "view_file",
                              "arguments": "{\"AbsolutePath\": \"/app/main.py\", \"unclosed\": true"
                          }
                      }
                  ]
              },
              "finish_reason": "tool_calls"
          }
      ]
  }
  {% else %}
  {
      "id": "chatcmpl-mock-coder-fail-tool-4",
      "choices": [
          {
              "message": {
                  "role": "assistant",
                  "content": "Retrying bad call 4.\n\n<thought>\nFailing repeatedly for UI rendering checks.\n</thought>\n",
                  "tool_calls": [
                      {
                          "id": "call_mock_coder_fail_tool_4",
                          "type": "function",
                          "function": {
                              "name": "view_file",
                              "arguments": "{\"AbsolutePath\": \"/app/main.py\", \"unclosed\": true"
                          }
                      }
                  ]
              },
              "finish_reason": "tool_calls"
          }
      ]
  }
  {% endif %}
stream:
  enabled: true
  lifecycle:
    on_chunk:
       template_body: '{"id":"chatcmpl-mock","choices":[{"index":0,"delta":{% if chunk is string %}{"content":{{ chunk | json_encode() }}}{% else %}{"tool_calls":{{ chunk | json_encode() | safe }}}{% endif %},"finish_reason":null}]}'
    on_stop:
       template_body: '[DONE]'
