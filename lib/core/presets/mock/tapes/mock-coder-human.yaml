name: "mock-coder-human"
priority: 100
matcher: "^/mock-coder-human/v1/chat/completions$"
request_mapping:
  model: "mock-coder-human"
response_body: |
  {% set turn = json.messages | length %}
  {% if turn <= 2 %}
  {
      "id": "chatcmpl-mock-coder-human-0",
      "choices": [
          {
              "message": {
                  "role": "assistant",
                  "content": "Listing dev dir.\n\n<thought>\nStarting routine checks on the filesystem.\n</thought>\n",
                  "tool_calls": [
                      {
                          "id": "call_mock_coder_human_0",
                          "type": "function",
                          "function": {
                              "name": "list_dir",
                              "arguments": "{\"DirectoryPath\": \"/app/src/\"}"
                          }
                      }
                  ]
              },
              "finish_reason": "tool_calls"
          }
      ]
  }
  {% elif turn <= 4 %}
  {
      "id": "chatcmpl-mock-coder-human-1",
      "choices": [
          {
              "message": {
                  "role": "assistant",
                  "content": "Listing temp.\n\n<thought>\nI want to inspect the temp directory.\n</thought>\n",
                  "tool_calls": [
                      {
                          "id": "call_mock_coder_human_1",
                          "type": "function",
                          "function": {
                              "name": "list_dir",
                              "arguments": "{\"DirectoryPath\": \"/tmp/\"}"
                          }
                      }
                  ]
              },
              "finish_reason": "tool_calls"
          }
      ]
  }
  {% elif turn <= 6 %}
  {
      "id": "chatcmpl-mock-coder-human-2",
      "choices": [
          {
              "message": {
                  "role": "assistant",
                  "content": "Requesting human-in-the-loop validation.\n\n<thought>\nI am generating a highly destructive bash command! I need permission first.\n</thought>\n",
                  "tool_calls": [
                      {
                          "id": "call_mock_coder_human_2",
                          "type": "function",
                          "function": {
                              "name": "session_request_permission",
                              "arguments": "{\"action\": \"run_command\", \"command\": \"Remove-Item -Path /tmp/* -Recurse -Force\"}"
                          }
                      }
                  ]
              },
              "finish_reason": "tool_calls"
          }
      ]
  }
  {% elif turn <= 8 %}
  {
      "id": "chatcmpl-mock-coder-human-3",
      "choices": [
          {
              "message": {
                  "role": "assistant",
                  "content": "Executing the confirmed command.\n\n<thought>\nAh, the user bravely approved the wipe. Executing.\n</thought>\n",
                  "tool_calls": [
                      {
                          "id": "call_mock_coder_human_3",
                          "type": "function",
                          "function": {
                              "name": "run_command",
                              "arguments": "{\"CommandLine\": \"Remove-Item -Path /tmp/* -Recurse -Force\", \"Cwd\": \"/tmp\", \"SafeToAutoRun\": true, \"WaitMsBeforeAsync\": 2000}"
                          }
                      }
                  ]
              },
              "finish_reason": "tool_calls"
          }
      ]
  }
  {% elif turn <= 10 %}
  {
      "id": "chatcmpl-mock-coder-human-4",
      "choices": [
          {
              "message": {
                  "role": "assistant",
                  "content": "Auditing file deletion state.\n\n<thought>\nVerifying the wipe actually took place.\n</thought>\n",
                  "tool_calls": [
                      {
                          "id": "call_mock_coder_human_4",
                          "type": "function",
                          "function": {
                              "name": "list_dir",
                              "arguments": "{\"DirectoryPath\": \"/tmp/\"}"
                          }
                      }
                  ]
              },
              "finish_reason": "tool_calls"
          }
      ]
  }
  {% else %}
  {
      "id": "chatcmpl-mock-coder-human-5",
      "choices": [
          {
              "message": {
                  "role": "assistant",
                  "content": "Task finished after explicit user permission was granted.\n\n<thought>\nCleanup successful. Data is scrubbed.\n</thought>\n"
              },
              "finish_reason": "stop"
          }
      ]
  }
  {% endif %}
stream:
  enabled: true
  lifecycle:
    on_chunk:
       template_body: '{"id":"chatcmpl-mock","choices":[{"index":0,"delta":{% if chunk is string %}{"content":{{ chunk | json_encode() }}}{% else %}{"tool_calls":{{ chunk | json_encode() | safe }}}{% endif %},"finish_reason":null}]}'
    on_stop:
       template_body: '[DONE]'
