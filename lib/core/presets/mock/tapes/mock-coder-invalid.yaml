name: "mock-coder-invalid"
priority: 100
matcher: "^/mock-coder-invalid/v1/chat/completions$"
request_mapping:
  model: "mock-coder-invalid"
response_body: |
  {% set turn = json.messages | length %}
  {% if turn <= 2 %}
  {
      "id": "chatcmpl-mock-coder-invalid-0",
      "choices": [
          {
              "message": {
                  "role": "assistant",
                  "content": "Verifying system date.\n\n<thought>\nBooting up the environment wrapper tests.\n</thought>\n",
                  "tool_calls": [
                      {
                          "id": "call_mock_coder_invalid_0",
                          "type": "function",
                          "function": {
                              "name": "run_command",
                              "arguments": "{\"CommandLine\": \"date /T\", \"Cwd\": \"/app\", \"SafeToAutoRun\": true, \"WaitMsBeforeAsync\": 2000}"
                          }
                      }
                  ]
              },
              "finish_reason": "tool_calls"
          }
      ]
  }
  {% else %}
  {
      "id": "chatcmpl-mock-coder-invalid-1",
      "choices": [
          {
              "message": {
                  "role": "assistant",
                  "content": "Triggering severe exception.\n\n<thought>\nNow emitting an invented, unregistered server tool call to force a routing invalid state bubble up.\n</thought>\n",
                  "tool_calls": [
                      {
                          "id": "call_mock_coder_invalid_1",
                          "type": "function",
                          "function": {
                              "name": "completely_invented_tool_name_invalid",
                              "arguments": "{\"arg\": \"fatal_payload\"}"
                          }
                      }
                  ]
              },
              "finish_reason": "tool_calls"
          }
      ]
  }
  {% endif %}
stream:
  enabled: true
  lifecycle:
    on_chunk:
       template_body: '{"id":"chatcmpl-mock","choices":[{"index":0,"delta":{% if chunk is string %}{"content":{{ chunk | json_encode() }}}{% else %}{"tool_calls":{{ chunk | json_encode() | safe }}}{% endif %},"finish_reason":null}]}'
    on_stop:
       template_body: '[DONE]'
