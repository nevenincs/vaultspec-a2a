                          }
                      }
                  ]
              },
              "finish_reason": "tool_calls"
          }
      ]
  }
  {% else %}
  {
      "id": "chatcmpl-mock-coder-success-16",
      "choices": [
          {
              "message": {
                  "role": "assistant",
                  "content": "All tasks completed successfully. The system represents a robust and scalable architecture.\n\n<thought>\nFinal verification complete. The development phase is officially closed and stable.\n</thought>\n"
              },
              "finish_reason": "stop"
          }
      ]
  }
