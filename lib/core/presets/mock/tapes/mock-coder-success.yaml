  {% elif turn <= 30 %}
  {
      "id": "chatcmpl-mock-coder-success-14",
      "choices": [
          {
              "message": {
                  "role": "assistant",
                  "content": "Executing unit tests.\n\n<thought>\nRunning tests against the core library locally via pytest.\n</thought>\n",
                  "tool_calls": [
