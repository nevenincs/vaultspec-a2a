name: "mock-coder-success"
priority: 100
matcher: "^/mock-coder-success/v1/chat/completions$"
request_mapping:
  model: "mock-coder-success"
response_body: |
  {% set turn = json.messages | length %}
  {% if turn <= 2 %}
  {
      "id": "chatcmpl-mock-coder-success-0",
      "choices": [
          {
              "message": {
                  "role": "assistant",
                  "content": "Initializing workspace discovery using native bash.\n\n<thought>\nI need to start by understanding the workspace. I'll search for Python files. To do so I will invoke the command line runner to exercise the bash execution flow.\n</thought>\n",
                  "tool_calls": [
                      {
                          "id": "call_mock_coder_success_0",
                          "type": "function",
                          "function": {
                              "name": "run_command",
                              "arguments": "{\"CommandLine\": \"fd . -e py -t f\", \"Cwd\": \"/app\", \"SafeToAutoRun\": true, \"WaitMsBeforeAsync\": 2000}"
                          }
                      }
                  ]
              },
              "finish_reason": "tool_calls"
          }
      ]
  }
  {% elif turn <= 4 %}
  {
      "id": "chatcmpl-mock-coder-success-1",
      "choices": [
          {
              "message": {
                  "role": "assistant",
                  "content": "Listing the project root layout.\n\n<thought>\nAh, many files found. Let me list the root directory to confirm the layout is standard.\n</thought>\n",
                  "tool_calls": [
                      {
                          "id": "call_mock_coder_success_1",
                          "type": "function",
                          "function": {
                              "name": "list_dir",
                              "arguments": "{\"DirectoryPath\": \"/app/\"}"
                          }
                      }
                  ]
              },
              "finish_reason": "tool_calls"
          }
      ]
  }
  {% elif turn <= 6 %}
  {
      "id": "chatcmpl-mock-coder-success-2",
      "choices": [
          {
              "message": {
                  "role": "assistant",
                  "content": "Checking system memory layout.\n\n<thought>\nOkay, I will explicitly query the underlying OS environment memory to ensure we have sufficient allocated capacity for processing.\n</thought>\n",
                  "tool_calls": [
                      {
                          "id": "call_mock_coder_success_2",
                          "type": "function",
                          "function": {
                              "name": "run_command",
                              "arguments": "{\"CommandLine\": \"systeminfo | findstr /C:\\\"Total Physical Memory\\\"\", \"Cwd\": \"/app\", \"SafeToAutoRun\": true, \"WaitMsBeforeAsync\": 2000}"
                          }
                      }
                  ]
              },
              "finish_reason": "tool_calls"
          }
      ]
  }
  {% elif turn <= 8 %}
  {
      "id": "chatcmpl-mock-coder-success-3",
      "choices": [
          {
              "message": {
                  "role": "assistant",
                  "content": "Examining the lib structure.\n\n<thought>\nI will see what is located inside the specific `lib` directory.\n</thought>\n",
                  "tool_calls": [
                      {
                          "id": "call_mock_coder_success_3",
                          "type": "function",
                          "function": {
                              "name": "list_dir",
                              "arguments": "{\"DirectoryPath\": \"/app/lib\"}"
                          }
                      }
                  ]
              },
              "finish_reason": "tool_calls"
          }
      ]
  }
  {% elif turn <= 10 %}
  {
      "id": "chatcmpl-mock-coder-success-4",
      "choices": [
          {
              "message": {
                  "role": "assistant",
                  "content": "Checking api components.\n\n<thought>\nLet's proceed by investigating the API subsystem to check if any endpoints require immediate patching.\n</thought>\n",
                  "tool_calls": [
                      {
                          "id": "call_mock_coder_success_4",
                          "type": "function",
                          "function": {
                              "name": "list_dir",
                              "arguments": "{\"DirectoryPath\": \"/app/lib/api\"}"
                          }
                      }
                  ]
              },
              "finish_reason": "tool_calls"
          }
      ]
  }
  {% elif turn <= 12 %}
  {
      "id": "chatcmpl-mock-coder-success-5",
      "choices": [
          {
              "message": {
                  "role": "assistant",
                  "content": "Reading __init__.py\n\n<thought>\nI should read the api `__init__.py` file to note what gets exposed.\n</thought>\n",
                  "tool_calls": [
                      {
                          "id": "call_mock_coder_success_5",
                          "type": "function",
                          "function": {
                              "name": "view_file",
                              "arguments": "{\"AbsolutePath\": \"/app/lib/api/__init__.py\"}"
                          }
                      }
                  ]
              },
              "finish_reason": "tool_calls"
          }
      ]
  }
  {% elif turn <= 14 %}
