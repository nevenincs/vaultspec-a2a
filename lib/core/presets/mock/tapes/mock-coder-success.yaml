                          "function": {
                              "name": "run_command",
                              "arguments": "{\"CommandLine\": \"uv run pytest lib/core/tests/ -v\", \"Cwd\": \"/app\", \"SafeToAutoRun\": true, \"WaitMsBeforeAsync\": 6000}"
                          }
                      }
