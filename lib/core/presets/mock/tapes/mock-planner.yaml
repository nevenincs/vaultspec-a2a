name: "mock-planner"
priority: 100
matcher: "^/mock-planner/v1/chat/completions$"
request_mapping:
  model: "mock-planner"
response_body: |
  {% set turn = json.messages | length %}
  {% if turn <= 2 %}
  {
      "id": "chatcmpl-mock-planner-0",
      "choices": [
          {
              "message": {
                  "role": "assistant",
                  "content": "Investigating constraints.\n\n<thought>\nI am the principal architect... Let's list the root content.\n</thought>\n",
                  "tool_calls": [
                      {
                          "id": "call_mock_planner_0",
                          "type": "function",
                          "function": {
                              "name": "list_dir",
                              "arguments": "{\"DirectoryPath\": \"/app/\"}"
                          }
                      }
                  ]
              },
              "finish_reason": "tool_calls"
          }
      ]
  }
  {% elif turn <= 4 %}
  {
      "id": "chatcmpl-mock-planner-1",
      "choices": [
          {
              "message": {
                  "role": "assistant",
                  "content": "Grepping docs.\n\n<thought>\nLooking for markdown specifications in the docs.\n</thought>\n",
                  "tool_calls": [
                      {
                          "id": "call_mock_planner_1",
                          "type": "function",
                          "function": {
                              "name": "grep_search",
                              "arguments": "{\"Query\": \"ADR\", \"SearchPath\": \"/app/docs/\"}"
                          }
                      }
                  ]
              },
              "finish_reason": "tool_calls"
          }
      ]
  }
  {% elif turn <= 6 %}
  {
      "id": "chatcmpl-mock-planner-2",
      "choices": [
          {
              "message": {
                  "role": "assistant",
                  "content": "Fetching ADR-001.\n\n<thought>\nReading the first ADR I found to orient my decisions.\n</thought>\n",
                  "tool_calls": [
                      {
                          "id": "call_mock_planner_2",
                          "type": "function",
                          "function": {
                              "name": "view_file",
                              "arguments": "{\"AbsolutePath\": \"/app/docs/adrs/001-initial-architecture.md\"}"
                          }
                      }
                  ]
              },
              "finish_reason": "tool_calls"
          }
      ]
  }
  {% elif turn <= 8 %}
  {
      "id": "chatcmpl-mock-planner-3",
      "choices": [
          {
              "message": {
                  "role": "assistant",
                  "content": "Reading yaml configs.\n\n<thought>\nChecking standard CI pipeline configurations via shell.\n</thought>\n",
                  "tool_calls": [
                      {
                          "id": "call_mock_planner_3",
                          "type": "function",
                          "function": {
                              "name": "run_command",
                              "arguments": "{\"CommandLine\": \"Get-Content docker-compose.yml | Select -First 10\", \"Cwd\": \"/app\", \"SafeToAutoRun\": true, \"WaitMsBeforeAsync\": 2000}"
                          }
                      }
                  ]
              },
              "finish_reason": "tool_calls"
          }
      ]
  }
  {% elif turn <= 10 %}
  {
      "id": "chatcmpl-mock-planner-4",
      "choices": [
          {
              "message": {
                  "role": "assistant",
                  "content": "Listing src/ui.\n\n<thought>\nChecking UI layout constraints.\n</thought>\n",
                  "tool_calls": [
                      {
                          "id": "call_mock_planner_4",
                          "type": "function",
                          "function": {
                              "name": "list_dir",
                              "arguments": "{\"DirectoryPath\": \"/app/src/ui\"}"
                          }
                      }
                  ]
              },
              "finish_reason": "tool_calls"
          }
      ]
  }
  {% elif turn <= 12 %}
  {
      "id": "chatcmpl-mock-planner-5",
      "choices": [
          {
              "message": {
                  "role": "assistant",
                  "content": "Inspecting tsconfig.\n\n<thought>\nReviewing typescript configs.\n</thought>\n",
                  "tool_calls": [
                      {
                          "id": "call_mock_planner_5",
                          "type": "function",
                          "function": {
                              "name": "view_file",
                              "arguments": "{\"AbsolutePath\": \"/app/src/ui/tsconfig.json\"}"
                          }
                      }
                  ]
              },
              "finish_reason": "tool_calls"
          }
      ]
  }
  {% elif turn <= 14 %}
  {
      "id": "chatcmpl-mock-planner-6",
      "choices": [
          {
              "message": {
                  "role": "assistant",
                  "content": "Inspecting package config.\n\n<thought>\nChecking the global requirements via package.json.\n</thought>\n",
                  "tool_calls": [
                      {
                          "id": "call_mock_planner_6",
                          "type": "function",
                          "function": {
                              "name": "view_file",
                              "arguments": "{\"AbsolutePath\": \"/app/src/ui/package.json\"}"
                          }
                      }
                  ]
              },
              "finish_reason": "tool_calls"
          }
      ]
  }
  {% elif turn <= 16 %}
  {
      "id": "chatcmpl-mock-planner-7",
      "choices": [
          {
              "message": {
                  "role": "assistant",
                  "content": "Writing artifact.\n\n<thought>\nSynthesizing the plan now into the artifacts dir to formally commit the objective.\n</thought>\n",
                  "tool_calls": [
                      {
                          "id": "call_mock_planner_7",
                          "type": "function",
                          "function": {
                              "name": "write_to_file",
                              "arguments": "{\"TargetFile\": \"/app/artifacts/implementation_plan.md\", \"CodeContent\": \"# Plan\\\\nDetailed execution phase.\", \"Complexity\": 1, \"Description\": \"Plan artifact\", \"EmptyFile\": false, \"IsArtifact\": true, \"Overwrite\": true}"
                          }
                      }
                  ]
              },
              "finish_reason": "tool_calls"
          }
      ]
  }
  {% else %}
  {
      "id": "chatcmpl-mock-planner-8",
      "choices": [
          {
              "message": {
                  "role": "assistant",
                  "content": "Plan finalized.\n\n<thought>\nThe implementation plan is finalized and ready for the coder to execute without ambiguity.\n</thought>\n"
              },
              "finish_reason": "stop"
          }
      ]
  }
  {% endif %}
stream:
  enabled: true
  lifecycle:
    on_chunk:
       template_body: '{"id":"chatcmpl-mock","choices":[{"index":0,"delta":{% if chunk is string %}{"content":{{ chunk | json_encode() }}}{% else %}{"tool_calls":{{ chunk | json_encode() | safe }}}{% endif %},"finish_reason":null}]}'
    on_stop:
       template_body: '[DONE]'
