name: "mock-reviewer"
priority: 100
matcher: "^/mock-reviewer/v1/chat/completions$"
request_mapping:
  model: "mock-reviewer"
response_body: |
  {% set turn = json.messages | length %}
  {% if turn <= 2 %}
  {
      "id": "chatcmpl-mock-reviewer-0",
      "choices": [
          {
              "message": {
                  "role": "assistant",
                  "content": "Reviewing git diff state.\n\n<thought>\nI must verify the code changes performed by the coder... Let's do a diff check.\n</thought>\n",
                  "tool_calls": [
                      {
                          "id": "call_mock_reviewer_0",
                          "type": "function",
                          "function": {
                              "name": "run_command",
                              "arguments": "{\"CommandLine\": \"git diff HEAD~1\", \"Cwd\": \"/app\", \"SafeToAutoRun\": true, \"WaitMsBeforeAsync\": 2000}"
                          }
                      }
                  ]
              },
              "finish_reason": "tool_calls"
          }
      ]
  }
  {% elif turn <= 4 %}
  {
      "id": "chatcmpl-mock-reviewer-1",
      "choices": [
          {
              "message": {
                  "role": "assistant",
                  "content": "Viewing architecture.\n\n<thought>\nDiff looks healthy but I will review the architecture file to ensure patterns hold up.\n</thought>\n",
                  "tool_calls": [
                      {
                          "id": "call_mock_reviewer_1",
                          "type": "function",
                          "function": {
                              "name": "view_file",
                              "arguments": "{\"AbsolutePath\": \"/app/lib/core/__init__.py\"}"
                          }
                      }
                  ]
              },
              "finish_reason": "tool_calls"
          }
      ]
  }
  {% elif turn <= 6 %}
  {
      "id": "chatcmpl-mock-reviewer-2",
      "choices": [
          {
              "message": {
                  "role": "assistant",
                  "content": "Running CI pipeline locally.\n\n<thought>\nRunning partial CI tests on the changed code module.\n</thought>\n",
                  "tool_calls": [
                      {
                          "id": "call_mock_reviewer_2",
                          "type": "function",
                          "function": {
                              "name": "run_command",
                              "arguments": "{\"CommandLine\": \"uv run pytest lib/api/tests/ --maxfail=1\", \"Cwd\": \"/app\", \"SafeToAutoRun\": true, \"WaitMsBeforeAsync\": 2000}"
                          }
                      }
                  ]
              },
              "finish_reason": "tool_calls"
          }
      ]
  }
  {% elif turn <= 8 %}
  {
      "id": "chatcmpl-mock-reviewer-3",
      "choices": [
          {
              "message": {
                  "role": "assistant",
                  "content": "Linting.\n\n<thought>\nChecking python standard compliance and lines.\n</thought>\n",
                  "tool_calls": [
                      {
                          "id": "call_mock_reviewer_3",
                          "type": "function",
                          "function": {
                              "name": "run_command",
                              "arguments": "{\"CommandLine\": \"uv run ruff check .\", \"Cwd\": \"/app\", \"SafeToAutoRun\": true, \"WaitMsBeforeAsync\": 2000}"
                          }
                      }
                  ]
              },
              "finish_reason": "tool_calls"
          }
      ]
  }
  {% elif turn <= 10 %}
  {
      "id": "chatcmpl-mock-reviewer-4",
      "choices": [
          {
              "message": {
                  "role": "assistant",
                  "content": "Running NPM lint.\n\n<thought>\nFormatting rules look robust, let me quickly double check typescript lint via NPM.\n</thought>\n",
                  "tool_calls": [
                      {
                          "id": "call_mock_reviewer_4",
                          "type": "function",
                          "function": {
                              "name": "run_command",
                              "arguments": "{\"CommandLine\": \"npm run lint\", \"Cwd\": \"/app/src/ui\", \"SafeToAutoRun\": true, \"WaitMsBeforeAsync\": 5000}"
                          }
                      }
                  ]
              },
              "finish_reason": "tool_calls"
          }
      ]
  }
  {% elif turn <= 12 %}
  {
      "id": "chatcmpl-mock-reviewer-5",
      "choices": [
          {
              "message": {
                  "role": "assistant",
                  "content": "Auditing against original plan.\n\n<thought>\nFinally I will read the generated implementation plan to ensure all original criteria were successfully matched.\n</thought>\n",
                  "tool_calls": [
                      {
                          "id": "call_mock_reviewer_5",
                          "type": "function",
                          "function": {
                              "name": "view_file",
                              "arguments": "{\"AbsolutePath\": \"/app/artifacts/implementation_plan.md\"}"
                          }
                      }
                  ]
              },
              "finish_reason": "tool_calls"
          }
      ]
  }
  {% else %}
  {
      "id": "chatcmpl-mock-reviewer-6",
      "choices": [
          {
              "message": {
                  "role": "assistant",
                  "content": "Code approved. The pull request is authorized for primary merge.\n\n<thought>\nReview passes decisively. Zero regressions detected. Code is fully verified.\n</thought>\n"
              },
              "finish_reason": "stop"
          }
      ]
  }
  {% endif %}
stream:
  enabled: true
  lifecycle:
    on_chunk:
       template_body: '{"id":"chatcmpl-mock","choices":[{"index":0,"delta":{% if chunk is string %}{"content":{{ chunk | json_encode() }}}{% else %}{"tool_calls":{{ chunk | json_encode() | safe }}}{% endif %},"finish_reason":null}]}'
    on_stop:
       template_body: '[DONE]'
