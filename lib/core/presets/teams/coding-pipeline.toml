[team]
id           = "coding-pipeline"
display_name = "Coding Pipeline Team"
description  = "Sequential plan → code → review pipeline. Suitable for structured delivery tasks with well-defined requirements."

[team.defaults]
provider   = "claude"
capability = "mid"

[team.topology]
type  = "pipeline"
order = ["planner", "coder", "reviewer"]

[[team.workers]]
agent_id = "planner"

[[team.workers]]
agent_id = "coder"

[[team.workers]]
agent_id = "reviewer"
