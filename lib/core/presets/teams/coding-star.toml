[team]
id           = "coding-star"
display_name = "Coding Star Team"
description  = "General-purpose team with dynamic supervisor routing. Suitable for open-ended coding tasks where the supervisor determines agent order based on context."

[team.defaults]
provider   = "claude"
capability = "mid"

[team.supervisor]
provider   = "claude"
capability = "max"

[team.topology]
type = "star"

[[team.workers]]
agent_id = "planner"

[[team.workers]]
agent_id = "coder"
model.capability = "high"

[[team.workers]]
agent_id = "reviewer"
