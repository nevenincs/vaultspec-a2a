[team]
id           = "mock-autonomous"
display_name = "Mock Autonomous Team"
description  = "Fully autonomous team working in tandem solving a problem. No user input required."

[team.defaults]
provider   = "mock"
capability = "mid"

[team.topology]
type  = "pipeline_loop"
order = ["mock-planner", "mock-coder-success", "mock-reviewer"]
loop_node = "mock-reviewer"
max_loops = 2

[team.permissions]
auto_approve = true

[team.persona]
directive = "Work autonomously in a loop to solve the problem."

[team.graph]
step_timeout_seconds = 60
recursion_limit      = 20

[[team.workers]]
agent_id = "mock-planner"

[[team.workers]]
agent_id = "mock-coder-success"

[[team.workers]]
agent_id = "mock-reviewer"
