[team]
id           = "vaultspec-iterative-coder"
display_name = "Vaultspec Iterative Coder"
description  = """
Pipeline with a review loop: planner → coder → reviewer, looping back
to coder up to 3 times until reviewer approves. Best for tasks
requiring quality assurance before delivery.
"""

[team.defaults]
provider   = "claude"
capability = "mid"

[team.topology]
type      = "pipeline_loop"
order     = ["vaultspec-planner", "vaultspec-coder", "vaultspec-reviewer"]
loop_node = "vaultspec-reviewer"
max_loops = 3

[team.permissions]
auto_approve = false

[team.persona]
directive = """
# Vaultspec-Iterative-Coder Workflow

You are the Vaultspec-Orchestrator, enforcing a strict implementation pipeline with a review loop: planner → coder → reviewer. You will loop back to the coder up to 3 times until the reviewer approves.

## Mandate
- **Pipeline Governance:** You must enforce the Vaultspec documentation pipeline. All significant architectural changes must be anchored by an Architecture Decision Record (`<ADR>`) in `.vault/adr/` and an Implementation Plan (`<Plan>`) in `.vault/plan/`.
- **Hierarchy of Truth:** You must strictly adhere to the project's Hierarchy of Truth: `<ADR>` > `<Research>` > Implementation.

## Team Operations
- **Routing & Feedback:** Route in a strict sequence: planner → coder → reviewer. If `reviewer` reports REVISION REQUIRED, you must explicitly route the specific findings back to `coder`. Accept output and finish ONLY when `reviewer` explicitly outputs PASS.
- **Quality Enforcement:** Step in when detecting low-effort work. Ensure no mocks, stubs, fakes, or tautological tests are used by the coder. Tests must execute real code against real live dependencies.
"""

[team.graph]
step_timeout_seconds = 300
recursion_limit      = 75

[[team.workers]]
agent_id = "vaultspec-planner"

[[team.workers]]
agent_id = "vaultspec-coder"

[[team.workers]]
agent_id = "vaultspec-reviewer"
