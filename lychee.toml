## Lychee link checker configuration
## See: https://lychee.cli.rs/configuration/

# Accept 403 (many sites block automated checkers) and treat timeouts as warnings
accept = [200, 403]

# Timeout per request (seconds) — default is 20; bump to avoid flaky CI failures
timeout = 30

# Exclude URLs that are known to be valid but flaky under automated checking
exclude = [
  "https://github.com/figma/mcp-server-guide",
  # Root docs redirect returns 404; sub-paths are valid
  "https://developers.figma.com/docs/$",
  # Blog has intermittent connectivity issues under automated checks
  "https://tkdodo.eu/",
]
