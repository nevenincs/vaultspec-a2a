# Machine-global dev-process registry configuration (dev-process-registry ADR).
#
# Single committed source of truth for port bands, per-role build/serve command
# templates, and staleness windows, shared across the a2a and dashboard repos.
# The registry allocates and the lifecycle verbs build/serve strictly from here;
# port-asserting tests read the bands from here too, so no port constant is ever
# scattered per test. Resident owner instances keep their fixed ports and are
# never allocated into by dev/test instances.

[resident]
# Fixed ports for the resident owner instances (never allocated by the registry).
engine = 8767
gateway = 8000

# Per-role dev/test configuration. `band` is an inclusive [start, end] port range;
# the registry allocates only within it. `heartbeat` marks roles that refresh a
# last_seen stamp, so staleness is judged against `staleness_ms`; non-heartbeat
# roles fall back to pure pid-liveness. `build`/`serve` are command templates; the
# tokens {python}, {port}, and {workspace} are substituted by the lifecycle verbs
# at run time. {python} resolves to the serving process's own interpreter
# (sys.executable) so `python`-invoking roles always run the venv interpreter that
# has vaultspec_a2a installed, never a bare-PATH base interpreter. A role whose
# serve reads its port from the environment declares an `env` table (values are
# {port}/{workspace}-substituted) instead of passing a flag the command lacks.

[roles.engine-dev]
band = [18760, 18769]
build = ["cargo", "build", "--release", "-p", "vaultspec-cli"]
heartbeat = true
# {workspace} is the engine's explicit data seat: the wrapper launches the engine
# with its cwd there so the cwd-relative data store never lands in the a2a project
# root shared with the resident engine. It is required - an unset seat is refused.
serve = ["{python}", "scripts/engine_serve.py", "--port", "{port}", "--workspace", "{workspace}"]
staleness_ms = 120000

[roles.gateway-dev]
band = [18100, 18109]
build = []
env = { VAULTSPEC_PORT = "{port}" }
heartbeat = true
serve = ["{python}", "-m", "vaultspec_a2a.cli.main", "serve"]
staleness_ms = 120000

[roles.worker-dev]
band = [18110, 18119]
build = []
env = { VAULTSPEC_WORKER_PORT = "{port}" }
heartbeat = false
serve = ["{python}", "-m", "vaultspec_a2a.worker"]
staleness_ms = 120000

[roles.scratch]
band = [18900, 18999]
build = []
heartbeat = false
serve = []
staleness_ms = 120000
