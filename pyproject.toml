[project]
name = "vaultspec-a2a"
version = "0.1.0"
description = "A2A Agent Orchestration Implementation"
requires-python = ">=3.13"

dependencies = [
  "anyio>=4.9.0",
  "apscheduler>=3.10",
  "aiosqlite>=0.20.0",
  "asyncpg>=0.30.0",
  "fastapi>=0.133.1",
  "httpx>=0.28.1",
  "langchain-core>=1.2.16",
  "langchain-openai>=1.1.10",
  "langgraph>=0.2.16",
  "langgraph-checkpoint-postgres>=2.0.0",
  "langgraph-checkpoint-sqlite>=2.0.0",
  "mcp>=1.26.0",
  "opentelemetry-sdk>=1.39.1",
  "opentelemetry-exporter-otlp-proto-grpc>=1.39.1",
  "opentelemetry-instrumentation-fastapi>=0.60b0",
  "pydantic>=2.12.5",
  "pydantic-settings>=2.13.1",
  "psycopg[binary,pool]>=3.2.9",
  "rich>=14.3.2",
  "sqlalchemy[asyncio]>=2.0.40",
  "starlette>=0.52.1",
  "uvicorn>=0.41.0",
  "websockets>=16.0",
  "alembic>=1.15.1",
  "click>=8.1",
  "langsmith>=0.3.1",
]

[project.scripts]
vaultspec = "vaultspec_a2a.cli:cli"
vaultspec-mcp = "vaultspec_a2a.protocols.mcp.__main__:main"

[project.optional-dependencies]
eval = [
  "agentevals>=0.0.4",
  "openevals>=0.0.4",
  "langsmith>=0.2",
]

[dependency-groups]
dev = [
  "deptry>=0.23.0",
  "identify>=2.0.0",
  "nodeenv>=1.0.0",
  "prek>=0.3.2",
  "psutil>=7.0.0",
  "pytest>=9.0.2",
  "pytest-asyncio>=1.3.0",
  "pytest-cov>=6.0.0",
  "pytest-timeout>=2.4.0",
  "ruff>=0.15.2",
  "tenacity>=9.0.0",
  "testcontainers[generic]>=4.12.0",
  "ty>=0.0.15",
  "vaultspec-core",
  "websockets>=16.0",
]

[tool.uv.sources]
vaultspec-core = { path = "Y:/code/vaultspec-core-worktrees/main", editable = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/vaultspec_a2a"]

[tool.pytest.ini_options]
# --capture=sys: avoids pytest's fd-level dup2 which crashes silently under
# Git Bash / MinTTY (the _windowsconsoleio_workaround path). sys-level capture
# replaces sys.stdout/stderr in memory only — no CloseHandle, no silent death.
addopts = ["--durations=10", "--showlocals", "-ra", "--capture=sys", "-m", "not live and not requires_postgres and not requires_jaeger and not requires_vidaimock"]
log_cli = true
log_cli_level = "INFO"
log_cli_format = "%(asctime)s [%(levelname)8s] %(name)s: %(message)s"
log_cli_date_format = "%H:%M:%S"
norecursedirs = [".venv", "knowledge", "node_modules", "ui"]
strict_xfail = true
testpaths = ["src/vaultspec_a2a"]
asyncio_mode = "strict"
asyncio_default_fixture_loop_scope = "function"
timeout = "300"
markers = [
  "live: marks tests requiring live ACP backend processes (deselect with '-m not live')",
  "requires_jaeger: marks tests that verify real OTel span export to the persistent local Jaeger instance (health at localhost:13133/status, OTLP at localhost:4317, UI/query at localhost:16686)",
  "requires_postgres: marks tests that require a live Postgres instance (fails if Postgres unreachable)",
  "requires_vidaimock: marks tests that require a running VidaiMock tape server (fails if unreachable at MOCK_API_BASE or localhost:8100)",
]

[tool.ruff]
line-length = 88
target-version = "py313"

[tool.ruff.lint]
select = [
  "E",   # pycodestyle errors
  "W",   # pycodestyle warnings
  "F",   # pyflakes
  "I",   # isort
  "B",   # flake8-bugbear
  "C4",  # flake8-comprehensions
  "UP",  # pyupgrade
  "ARG", # flake8-unused-arguments
  "SIM", # flake8-simplify
  "TCH", # flake8-type-checking
  "RUF", # ruff-specific rules
  "N",   # pep8-naming
]
unfixable = ["B"]

[tool.ruff.lint.per-file-ignores]
"**/test_*.py" = ["ARG"]
"**/tests/**/*.py" = ["ARG"]
# FastAPI endpoints use Depends() in function defaults
"src/vaultspec_a2a/api/endpoints.py" = ["B008"]
"src/vaultspec_a2a/api/internal.py" = ["B008"]
"src/vaultspec_a2a/worker/app.py" = ["B008"]

[tool.ruff.lint.isort]
known-first-party = ["vaultspec_a2a"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"

[tool.deptry]
extend_exclude = ["knowledge"]

[tool.deptry.package_module_name_map]
opentelemetry-sdk = "opentelemetry"
opentelemetry-exporter-otlp-proto-grpc = "opentelemetry"
opentelemetry-instrumentation-fastapi = "opentelemetry"
pytest-asyncio = "pytest_asyncio"

[tool.deptry.per_rule_ignores]
# DEP002: packages invoked as CLI tools or loaded via URL scheme (not direct Python imports)
DEP002 = [
  "ruff",
  "ty",
  "prek",
  "identify",
  "nodeenv",
  "pytest-timeout",
  "pytest-cov",
  "deptry",
  "vaultspec-core",
  # aiosqlite is loaded as the SQLAlchemy async driver via the URL scheme
  # "sqlite+aiosqlite://..." — never imported directly.
  "aiosqlite",
  # agentevals/openevals are in the [eval] optional group; not imported in src/.
  "agentevals",
  "openevals",
]
# DEP004: test files inside src/**/ import dev packages (pytest, tenacity) as expected.
# This is the standard src-layout pattern; suppressing per-package is cleaner than
# excluding all test directories from scanning.
DEP004 = [
  "pytest",
  "pytest_asyncio",
  "tenacity",
]

[tool.ty.environment]
python-version = "3.13"
root = [".", "src"]

[tool.ty.src]
