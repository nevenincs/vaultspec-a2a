[project]
name = "vaultspec-a2a"
version = "0.1.0"
description = "A2A Agent Orchestration Implementation"
requires-python = ">=3.13,<3.14"
dependencies = [
  "PyYAML>=6.0.3",
  "a2a-sdk>=0.3.24",
  "agent-client-protocol>=0.8.1",
  "claude-agent-sdk @ git+https://github.com/anthropics/claude-agent-sdk-python.git@main",
  "fastapi>=0.133.1",
  "fastmcp>=3.0.2",
  "httpx>=0.28.1",
  "langchain-anthropic>=1.3.4",
  "langchain-core>=1.2.16",
  "langchain-google-genai>=4.2.1",
  "langchain-mcp-adapters>=0.2.1",
  "langchain-openai>=1.1.10",
  "mcp>=1.26.0",
  "pydantic>=2.12.5",
  "pydantic-settings>=2.13.1",
  "pywin32>=311",
  "rich>=14.3.2",
  "sse-starlette>=3.2.0",
  "starlette>=0.52.1",
  "uvicorn>=0.41.0",
  "winfcntl>=1.1.9",
]

[project.optional-dependencies]
dev = [
  "pytest>=9.0.2",
  "pytest-asyncio>=1.3.0",
  "pytest-timeout>=2.4.0",
  "ruff>=0.15.2",
  "ty>=0.0.15",
  "prek>=0.3.2",
  "identify>=2.0.0",
  "nodeenv>=1.0.0",
]

[dependency-groups]
dev = [
  "identify>=2.0.0",
  "nodeenv>=1.0.0",
  "prek>=0.3.2",
  "pytest>=9.0.2",
  "pytest-asyncio>=1.3.0",
  "pytest-timeout>=2.4.0",
  "ruff>=0.15.2",
  "ty>=0.0.15",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.metadata]
allow-direct-references = true

[tool.hatch.build.targets.wheel]
packages = ["lib"]

[tool.pytest]
addopts = ["--durations=10", "--showlocals", "-ra"]
log_cli = true
log_cli_level = "INFO"
norecursedirs = ["knowledge", "node_modules", "ui"]
strict_xfail = true
testpaths = ["lib", "tests"]
asyncio_mode = "strict"
asyncio_default_fixture_loop_scope = "function"
timeout = "300"

[tool.ruff]
line-length = 88
target-version = "py313"

[tool.ruff.lint]
select = [
  "E",  # pycodestyle errors
  "W",  # pycodestyle warnings
  "F",  # pyflakes
  "I",  # isort
  "B",  # bugbear
  "C4",  # comprehensions
  "UP",  # pyupgrade
  "ARG",  # unused-arguments
  "SIM",  # simplify
  "TC",  # type-checking
  "RUF",  # ruff-specific rules
  "N",  # pep8-naming
  "PT",  # pytest-style
  "T20",  # print statements
  "ERA",  # commented-out code
  "TRY",  # exception handling
  "PLE",  # pylint errors
  "PLW",  # pylint warnings
]
unfixable = ["B"]

[tool.ty.environment]
python-version = "3.13"
root = [".", "lib"]
