[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "vaultspec-a2a"
version = "0.1.0"
description = "A2A Agent Orchestration Implementation"
requires-python = ">=3.13,<3.14"
dependencies = [
  "PyYAML>=6.0.3",
  "a2a-sdk>=0.3.24",
  "agent-client-protocol>=0.8.1",
  "claude-agent-sdk @ git+https://github.com/anthropics/claude-agent-sdk-python.git@main",
  "httpx>=0.28.1",
  "mcp>=1.26.0",
  "pydantic>=2.12.5",
  "rich>=14.3.2",
  "sse-starlette>=3.2.0",
  "starlette>=0.52.1",
  "uvicorn>=0.41.0",
]

[project.optional-dependencies]
dev = [
  "pytest>=9.0.2",
  "pytest-asyncio>=1.3.0",
  "pytest-timeout>=2.4.0",
  "ruff>=0.15.2",
  "ty>=0.0.15",
  "prek>=0.3.2",
  "identify>=2.0.0",
  "nodeenv>=1.0.0",
]

[dependency-groups]
dev = [
  "identify>=2.0.0",
  "nodeenv>=1.0.0",
  "prek>=0.3.2",
  "pytest>=9.0.2",
  "pytest-asyncio>=1.3.0",
  "pytest-timeout>=2.4.0",
  "ruff>=0.15.2",
  "ty>=0.0.15",
]

[tool.hatch.metadata]
allow-direct-references = true

[tool.hatch.build.targets.wheel]
packages = ["src/vaultspec_a2a"]

[tool.ruff]
line-length = 88
target-version = "py313"

[tool.ruff.lint]
select = [
  "E",   # pycodestyle errors
  "W",   # pycodestyle warnings
  "F",   # pyflakes
  "I",   # isort
  "B",   # flake8-bugbear
  "C4",  # flake8-comprehensions
  "UP",  # pyupgrade
  "ARG", # flake8-unused-arguments
  "SIM", # flake8-simplify
  "TCH", # flake8-type-checking
  "RUF", # ruff-specific rules
  "N",   # pep8-naming
]
unfixable = ["B"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests", "src"]
timeout = 300

[tool.ty.environment]
python-version = "3.13"
root = [".", "src"]
