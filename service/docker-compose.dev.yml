# Headless development environment: backend gateway + worker.
# Usage: docker compose -f service/docker-compose.dev.yml up --build
# Gateway: http://localhost:18000

services:
  gateway:
    build:
      context: ..
      dockerfile: service/docker/prod.Dockerfile
      target: gateway
    ports:
      - '${VAULTSPEC_PORT:-18000}:18000'
    volumes:
      - db-data:/app/data
    environment:
      VAULTSPEC_DATABASE_URL: 'sqlite+aiosqlite:////app/data/vaultspec.db'
      VAULTSPEC_DATABASE_BACKEND: sqlite
      VAULTSPEC_CHECKPOINT_BACKEND: sqlite
      VAULTSPEC_WORKER_URL: 'http://worker:18001'
      VAULTSPEC_AUTO_SPAWN_WORKER: 'false'
    depends_on:
      worker:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD',
          'python',
          '-c',
          "import urllib.request; urllib.request.urlopen('http://localhost:18000/internal/health')",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  worker:
    build:
      context: ..
      dockerfile: service/docker/prod.Dockerfile
      target: worker
    volumes:
      - db-data:/app/data
    environment:
      VAULTSPEC_DATABASE_URL: 'sqlite+aiosqlite:////app/data/vaultspec.db'
      VAULTSPEC_DATABASE_BACKEND: sqlite
      VAULTSPEC_CHECKPOINT_BACKEND: sqlite
      VAULTSPEC_GATEWAY_URL: 'http://gateway:18000'
    healthcheck:
      test:
        [
          'CMD',
          'python',
          '-c',
          "import urllib.request; urllib.request.urlopen('http://localhost:18001/health')",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

volumes:
  db-data:
