# Single-node SQLite deployment: gateway + worker + Jaeger.
# Suitable for local testing of production container images and
# single-node deployments where an external Postgres is not available.
#
# Usage: docker compose -f service/docker-compose.prod.yml up --build
#
# Postgres (recommended for production):
#   docker compose -f service/docker-compose.prod.yml -f service/docker-compose.prod.postgres.yml up --build
#
# Gateway: http://localhost:8000 (FastAPI serves React SPA)
# Jaeger UI: http://localhost:16686

services:
  gateway:
    build:
      context: ..
      dockerfile: service/docker/prod.Dockerfile
      target: gateway
    restart: unless-stopped
    ports:
      - '${VAULTSPEC_PORT:-8000}:8000'
    volumes:
      - db-data:/app/data
    environment:
      VAULTSPEC_ENVIRONMENT: 'production'
      VAULTSPEC_DATABASE_URL: 'sqlite+aiosqlite:////app/data/vaultspec.db'
      VAULTSPEC_DATABASE_BACKEND: sqlite
      VAULTSPEC_CHECKPOINT_BACKEND: sqlite
      VAULTSPEC_WORKER_URL: 'http://worker:8001'
      VAULTSPEC_AUTO_SPAWN_WORKER: 'false'
      VAULTSPEC_INTERNAL_TOKEN: '${VAULTSPEC_INTERNAL_TOKEN:?VAULTSPEC_INTERNAL_TOKEN is required}'
      OTEL_EXPORTER_OTLP_ENDPOINT: 'http://jaeger:4317'
      OTEL_EXPORTER_OTLP_INSECURE: 'true'
    depends_on:
      jaeger:
        condition: service_healthy
      worker:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD',
          'python',
          '-c',
          "import json, sys, urllib.request; data = json.load(urllib.request.urlopen('http://localhost:8000/api/health')); sys.exit(0 if data.get('status') == 'ok' else 1)",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  worker:
    build:
      context: ..
      dockerfile: service/docker/prod.Dockerfile
      target: worker
    restart: unless-stopped
    volumes:
      - db-data:/app/data
    environment:
      VAULTSPEC_ENVIRONMENT: 'production'
      VAULTSPEC_DATABASE_URL: 'sqlite+aiosqlite:////app/data/vaultspec.db'
      VAULTSPEC_DATABASE_BACKEND: sqlite
      VAULTSPEC_CHECKPOINT_BACKEND: sqlite
      VAULTSPEC_GATEWAY_URL: 'http://gateway:8000'
      VAULTSPEC_INTERNAL_TOKEN: '${VAULTSPEC_INTERNAL_TOKEN:?VAULTSPEC_INTERNAL_TOKEN is required}'
      OTEL_EXPORTER_OTLP_ENDPOINT: 'http://jaeger:4317'
      OTEL_EXPORTER_OTLP_INSECURE: 'true'
    depends_on:
      jaeger:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD',
          'python',
          '-c',
          "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  jaeger:
    image: cr.jaegertracing.io/jaegertracing/jaeger:2.16.0
    restart: unless-stopped
    ports:
      - '${JAEGER_OTLP_PORT:-4317}:4317'
      - '4318:4318'
      - '${JAEGER_UI_PORT:-16686}:16686'
      - '13133:13133'
    environment:
      COLLECTOR_OTLP_ENABLED: 'true'
    healthcheck:
      test: ['CMD', 'wget', '--quiet', '--tries=1', '--spider', 'http://localhost:13133/status']
      interval: 5s
      timeout: 2s
      retries: 10
      start_period: 5s

volumes:
  db-data:
