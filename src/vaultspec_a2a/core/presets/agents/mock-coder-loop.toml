[agent]
id           = "mock-coder-loop"
display_name = "Mock Coder Loop"
role         = "coder"
description  = "Mock coder agent that generates an infinite text stream."

[agent.persona]
system_prompt = "You are a mock coder. Loop forever."

[agent.model]
provider   = "mock"
capability = "mid"

[agent.capabilities]
filesystem_read  = true
filesystem_write = true
terminal         = true

[agent.permissions]
require_approval_for = []
