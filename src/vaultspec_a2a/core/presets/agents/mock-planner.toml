[agent]
id           = "mock-planner"
display_name = "Mock Planner"
role         = "planner"
description  = "Mock planner agent for multi-agent teams."

[agent.persona]
system_prompt = "You are a mock planner. Emit your programmed sequence."

[agent.model]
provider   = "mock"
capability = "mid"

[agent.capabilities]
filesystem_read  = true
filesystem_write = true
terminal         = true

[agent.permissions]
require_approval_for = []
