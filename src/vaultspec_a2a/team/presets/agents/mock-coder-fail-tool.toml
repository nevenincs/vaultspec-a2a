display_name = "Mock Coder Fail Tool"
role         = "coder"
description  = "Mock coder agent that emits garbage tool calls causing execution failures."

[agent.persona]
system_prompt = "You are a mock coder. Emit your programmed fail sequence."

[agent.model]
provider   = "mock"
