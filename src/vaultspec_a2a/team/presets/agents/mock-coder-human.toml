[agent]
id           = "mock-coder-human"
display_name = "Mock Coder Human"
role         = "coder"
description  = "Mock coder agent that emits a tool call requiring human approval."

[agent.persona]
system_prompt = "You are a mock coder. Emit your programmed human-in-the-loop sequence."

[agent.model]
provider   = "mock"
capability = "mid"

[agent.capabilities]
filesystem_read  = true
filesystem_write = true
terminal         = true

[agent.permissions]
require_approval_for = ["session_request_permission"]
