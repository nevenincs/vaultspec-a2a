matcher: ^/mock-coder-human/v1/chat/completions$
name: mock-coder-human
priority: 100
request_mapping:
  model: mock-coder-human
response_body: '{%- set n = json.messages | length -%}{%- if n <= 4 -%}{"choices":[{"message":{"role":"assistant","content":[{"type":"reasoning","reasoning":"I need to run a privileged operation. I must request human approval before proceeding."},{"type":"text","text":"Requesting permission to execute a privileged command."}],"tool_calls":[{"id":"call_0","type":"function","function":{"name":"session_request_permission","arguments":"{\"description\": \"Run a privileged shell command: sudo apt-get update\", \"options\": [{\"optionId\": \"approve\", \"name\": \"Approve\", \"kind\": \"proceed\"}, {\"optionId\": \"reject_once\", \"name\": \"Deny\", \"kind\": \"reject_once\"}]}"}}]}}]}{%- elif "reject_once" in json.messages[4].content -%}{"choices":[{"message":{"role":"assistant","content":[{"type":"reasoning","reasoning":"The permission was denied, so the privileged operation must not run."},{"type":"text","text":"Permission denied. The privileged command was not executed."}]}}]}{%- elif "approve" in json.messages[4].content -%}{"choices":[{"message":{"role":"assistant","content":[{"type":"reasoning","reasoning":"The permission was approved and the privileged work finished successfully."},{"type":"text","text":"Permission approved. The privileged command completed successfully and the task is now finished."}]}}]}{%- else -%}{"choices":[{"message":{"role":"assistant","content":[{"type":"reasoning","reasoning":"The permission payload did not match an allowed outcome, so the operation must remain blocked."},{"type":"text","text":"Permission outcome was invalid. The privileged command was not executed."}]}}]}{%- endif -%}'
stream:
  enabled: true
