[team]
id           = "mock-failure-tool"
display_name = "Mock Tool Failure"
description  = "A team that finished running with a failure involving tool calling errors."

[team.defaults]
provider   = "mock"
capability = "mid"

[team.topology]
type  = "pipeline"
order = ["mock-coder-fail-tool"]

[team.permissions]
auto_approve = true

[team.persona]
directive = "Simulate tool crash."

[team.graph]
step_timeout_seconds = 60
recursion_limit      = 10

[[team.workers]]
agent_id = "mock-coder-fail-tool"
