[team]
id           = "mock-human-in-loop"
display_name = "Mock Human in Loop"
description  = "Team that is running but requires user input to approve a tool."

[team.defaults]
provider   = "mock"
capability = "mid"

[team.topology]
type  = "pipeline"
order = ["mock-coder-human"]

[team.permissions]
auto_approve = false

[team.persona]
directive = "Request permission using a tool."

[team.graph]
step_timeout_seconds = 60
recursion_limit      = 10

[[team.workers]]
agent_id = "mock-coder-human"
