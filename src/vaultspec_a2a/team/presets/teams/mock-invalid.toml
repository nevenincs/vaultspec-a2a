[team]
id           = "mock-invalid"
display_name = "Mock Invalid State"
description  = "A team that is invalid due to an internal LangGraph issue (e.g. InvalidUpdateError)."

[team.defaults]
provider   = "mock"
capability = "mid"

[team.topology]
type  = "pipeline"
order = ["mock-coder-invalid"]

[team.permissions]
auto_approve = true

[team.persona]
directive = "Simulate invalid state crash."

[team.graph]
step_timeout_seconds = 60
recursion_limit      = 10

[[team.workers]]
agent_id = "mock-coder-invalid"
