[team]
id           = "vaultspec-adr-research-mock"
display_name = "Vaultspec ADR Research (deterministic)"
description  = """
Deterministic variant of vaultspec-adr-research for the P04.S10 headless
acceptance harness. Identical research_adr topology and the SAME four worker
agent_ids (so the actor-token bundle keys and the submitter role keys are
unchanged); only the provider is overridden to the in-process deterministic
mock provider per worker, so the full Research -> ADR contract runs without
Docker or real provider credentials. Not a product preset: it exists to certify
the loop reproducibly. Real-provider collaboration is proven by running the same
harness against the vaultspec-adr-research preset.
"""

[team.defaults]
provider   = "mock"
capability = "mid"

[team.topology]
type  = "research_adr"
order = []

[team.permissions]
auto_approve = false

[team.persona]
directive = """
# Vaultspec-ADR-Research Workflow (deterministic mock)

Deterministic stand-in for the vaultspec-adr-research directive: the research_adr
graph structure enforces the phase machine (Ground -> Diverge -> Synthesize ->
Gate -> Decide); the mock provider supplies each role's turn. Structural gates,
not prompt convention, drive transitions.

- Vault documents only; no direct filesystem writes; all authoring goes through
  engine proposals.
- vaultspec-doc-reviewer returns "PASS" to advance a phase; "REVISION REQUIRED"
  routes back to the writer.

{{FEATURE_CONTEXT}}
"""

[team.graph]
step_timeout_seconds = 600
recursion_limit      = 50

[[team.workers]]
agent_id = "vaultspec-researcher"
model    = { provider = "mock" }

[[team.workers]]
agent_id = "vaultspec-synthesist"
model    = { provider = "mock" }

[[team.workers]]
agent_id = "vaultspec-adr-author"
model    = { provider = "mock" }

[[team.workers]]
agent_id = "vaultspec-doc-reviewer"
model    = { provider = "mock" }
