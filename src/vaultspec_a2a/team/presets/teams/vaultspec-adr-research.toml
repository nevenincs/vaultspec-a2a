[team]
id           = "vaultspec-adr-research"
display_name = "Vaultspec ADR Research"
description  = """
Phase-machine topology (research_adr) that carries a topic from ground through
parallel research threads, synthesis, and ADR authoring — each phase gated by an
inner doc-review loop and an outer human review-lane verdict. Personas: researcher
(multi-instance fan-out), synthesist (Research document author), adr-author (ADR
document author), doc-reviewer (inner quality gate). No persona writes to the
filesystem directly; all authoring goes through engine proposals. Human applies
via the dashboard review lane.
"""

[team.defaults]
provider   = "claude"
capability = "mid"

[team.topology]
type  = "research_adr"
order = []

[team.permissions]
auto_approve = false

[team.persona]
directive = """
# Vaultspec-ADR-Research Workflow

You are the Vaultspec-Orchestrator for the research-to-ADR phase machine. You govern
a five-stage pipeline: Ground -> Diverge -> Synthesize -> Gate -> Decide.

## Mandate

- **Vault documents only**: This team authors Research documents and ADRs exclusively.
  Coding and code management are out of scope. Reject any request that falls outside
  vault document authoring.
- **No direct filesystem writes**: All document authoring goes through engine proposals
  (propose/validate). No persona in this team may call request_apply or write to the
  filesystem. Human applies via the dashboard review lane.
- **Structural gates**: Phase transitions are enforced by graph structure, not by LLM
  convention. Do not advance a phase by prompting — wait for the gate verdict.

## Pipeline stages

- **Ground** (supervisor): Retrieve governing ADRs and prior research. Decide
  amend-vs-supersede posture. Compose the research thread specs.
- **Diverge** (fan-out to vaultspec-researcher x N): Dispatch parallel research
  threads to their assigned topics. Accumulate findings in the thread's
  research_findings state field.
- **Synthesize** (vaultspec-synthesist): Join findings into one Research document
  proposal. Inner quality loop: vaultspec-doc-reviewer -> REVISION REQUIRED -> revise
  -> PASS -> phase gate.
- **Gate 1** (human review lane): Research proposal submitted for human verdict.
  Approved -> proceed to Decide. Rejected/RequestChanges -> route reviewer notes back
  to synthesist.
- **Decide** (vaultspec-adr-author): Author ADR proposal citing research by stem.
  Same inner quality loop and gate.
- **Gate 2** (human review lane): ADR proposal submitted for human verdict.

## Routing rules

- Route to vaultspec-researcher for research thread execution.
- Route to vaultspec-synthesist when all researcher threads have returned findings.
- Route to vaultspec-doc-reviewer for inner quality checks (Research and ADR phases).
- Route to vaultspec-adr-author after Gate 1 Approved verdict.
- FINISH only after Gate 2 returns an Approved verdict.

## Sentinel recognition

- vaultspec-synthesist ending with "RESEARCH READY" signals the synthesis stage is
  complete; submit the proposal to Gate 1.
- vaultspec-adr-author ending with "ADR READY" signals the ADR stage is complete;
  submit the proposal to Gate 2.
- vaultspec-doc-reviewer returning "PASS" advances the phase; "REVISION REQUIRED"
  routes back to the writer with the findings.

{{FEATURE_CONTEXT}}
"""

[team.graph]
step_timeout_seconds = 1800
recursion_limit      = 50

[[team.workers]]
agent_id = "vaultspec-researcher"

[[team.workers]]
agent_id = "vaultspec-synthesist"

[[team.workers]]
agent_id = "vaultspec-adr-author"

[[team.workers]]
agent_id = "vaultspec-doc-reviewer"

# Agent harness. Opts every document-authoring worker into the read-only
# vaultspec-rag grounding server (the sole `_KNOWN_MCP_SERVERS` entry): its
# composed tool names join the autonomous allowedTools and its stdio server is
# advertised in `session/new`, delivering semantic recall of code and the vault
# alongside the native Read/Grep/Glob floor. Read-only by construction - no
# write verb is composed. `required_surfaces` defaults to all five authoring
# surfaces, so this only WIDENS the harness by the grounding server.
[team.harness]
mcp_servers = ["vaultspec-rag"]

# Model profiles. `team-defaults` is implicit (the empty overlay) and is the
# default profile; it is not declared here. `fast` drops the two high-volume
# roles (parallel research fan-out and the inner review loop) to the low
# capability level while the two authoring roles keep the team default (mid),
# where document quality matters. Roles absent from a profile fall through the
# normal precedence chain unchanged.
[team.profiles.fast]
display_name = "Fast"
description  = """
Lower-latency research and review: the researcher fan-out and the doc-reviewer
run at the low capability level; the synthesist and adr-author keep the team
default so authored documents retain full capability.
"""

[team.profiles.fast.roles.vaultspec-researcher]
capability = "low"

[team.profiles.fast.roles.vaultspec-doc-reviewer]
capability = "low"

# `codex` is the mixed-provider provider-axis lane: the three research/authoring
# roles run on `codex` (the `codex app-server` JSON-RPC provider, file-based
# ChatGPT-session auth) while the inner
# doc-reviewer keeps the team default (claude), so a single run exercises a
# genuinely mixed codex/claude collaboration and BOTH materialized documents are
# codex-authored. The overlay only sets `provider` per role; capability/fallback
# fall through the normal precedence chain unchanged.
[team.profiles.codex]
display_name = "Codex (mixed)"
description  = """
Mixed-provider provider-axis lane: the researcher fan-out, the research-document
synthesist, and the ADR author run on the codex app-server provider; the inner
doc-reviewer keeps the team default (claude). Proves cross-provider collaboration
authors real documents end to end. Codex auth is the file-based persisted ChatGPT
session in the Codex home; no credential env is injected.
"""

[team.profiles.codex.roles.vaultspec-researcher]
provider = "codex"

[team.profiles.codex.roles.vaultspec-synthesist]
provider = "codex"

[team.profiles.codex.roles.vaultspec-adr-author]
provider = "codex"

# `zai` is the Z.ai provider-axis lane. Credential-gated on ZAI_AUTH_TOKEN: the
# harness skips this lane loudly (naming the missing token) when the token is
# absent from the environment, and never fakes it. The three research/authoring
# roles run on `zai` while the doc-reviewer keeps the team default (claude).
[team.profiles.zai]
display_name = "Z.ai (mixed)"
description  = """
Mixed-provider provider-axis lane routing the researcher fan-out, the synthesist,
and the ADR author to the Z.ai provider; the inner doc-reviewer keeps the team
default (claude). Requires a configured Z.ai auth token; the harness skips
this lane with a truthful reason when the credential is absent.
"""

[team.profiles.zai.roles.vaultspec-researcher]
provider = "zai"

[team.profiles.zai.roles.vaultspec-synthesist]
provider = "zai"

[team.profiles.zai.roles.vaultspec-adr-author]
provider = "zai"
